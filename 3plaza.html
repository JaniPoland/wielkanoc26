<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 3</title>

  <style>
    body {
      font-family: Arial;
      background:#f4f1ee;
      text-align:center;
      margin:0;
    }

    .box, .container {
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 6px 12px rgba(0,0,0,0.2);
      margin:20px auto;
      max-width:700px;
    }

    .login {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    h1 {
      font-size:40px;
      color:#b8860b;
      letter-spacing:3px;
      margin-bottom:10px;
    }

    input {
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#b8860b;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    .content {
      display:none;
    }

    #timerBtn {
      display:none;
      margin-top:15px;
    }

    img {
      max-width:100%;
      display:none;
      margin-top:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- LOGOWANIE -->
<div class="login" id="loginBox">
  <div class="box">
    <h1>LEVEL 3</h1>
    <h2>Podaj hasło</h2>
    <input id="password" placeholder="hasło">
    <br><br>
    <button onclick="checkPassword()">Wejdź</button>
    <p id="error" style="color:red; display:none;">Złe hasło</p>
  </div>
</div>

<!-- TREŚĆ -->
<div class="content" id="content">

  <div class="container">
    <h2>Zagadka</h2>
    <p>Kieruj się ku północy, tam wiedzie twój szlak </p>
    <p>Wypatruj uważnie — pojawi się znak.</p>
  </div>
<div class="container">
  <h2> odszyfruj hasło</h2>

  <p>Może być Sukiel</p>
  <p>Może być Ukiel</p>

  
  <p>A Długie przed Tobą</p>
<p>Ze słodką wodą</p>
 

  <p><strong>Czy wiesz, jakie jest hasło?</strong></p>
</div>

  <div class="container">
    <h2>Ukryta wskazówka</h2>
    <button id="timerBtn" onclick="showImage()">Czekaj...</button>
    <img id="img" src="3.jpeg">
  </div>

</div>

<script>
const correctPassword = "szuwarek"; // ← zmień hasło
let time = 300; // 5 minut

function checkPassword(){
  let val = document.getElementById("password").value;

  if(val.toLowerCase() === correctPassword){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("content").style.display="block";
    startTimer();
    playMelody();
  } else {
    document.getElementById("error").style.display="block";
  }
}

function startTimer(){
  let btn = document.getElementById("timerBtn");
  btn.style.display="inline-block";

  let interval = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;

    btn.innerText = `Odblokuje się za ${m}:${s.toString().padStart(2,'0')}`;
    btn.disabled = true;

    time--;

    if(time < 0){
      clearInterval(interval);
      btn.innerText = "Kliknij, aby odkryć";
      btn.disabled = false;
    }

  },1000);
}

function showImage(){
  document.getElementById("img").style.display="block";
}

// 🎵 klimatyczna melodyjka (fantasy vibe)
function playMelody(){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();

  const notes=[261,329,392,523,392,329,261,294,349,440,587];

  notes.forEach((f,i)=>{
    let o=ctx.createOscillator();
    let g=ctx.createGain();

    o.type="triangle";
    o.frequency.value=f;

    o.connect(g);
    g.connect(ctx.destination);

    o.start(ctx.currentTime+i*0.25);
    o.stop(ctx.currentTime+i*0.25+0.2);
  });
}
</script>

</body>
</html>
